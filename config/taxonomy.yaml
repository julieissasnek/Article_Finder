# Version: 3.2.2
# Article Finder v3 - Multi-Tree Taxonomy
# Living document - version controlled and continuously improved

metadata:
  version: "0.3.0"
  created: "2024-12-29"
  last_updated: "2024-12-29"
  domain: "neuroarchitecture"
  description: "Faceted classification system for cognitive and affective architecture research"

# ============================================================================
# FACET DEFINITIONS
# ============================================================================

facets:
  - id: environmental_factors
    name: "Environmental Factors (IVs)"
    description: "What physical/sensory attributes vary or are manipulated"
    
  - id: outcomes
    name: "Outcomes (DVs)"
    description: "What human responses are measured or affected"
    
  - id: subjects
    name: "Subjects (Population)"
    description: "Who is being studied"
    
  - id: settings
    name: "Settings (Building Typology)"
    description: "Where the study takes place"
    
  - id: methodology
    name: "Methodology"
    description: "How the study was conducted"
    
  - id: modality
    name: "Modality (Real/Virtual)"
    description: "What kind of environment was studied"
    
  - id: cross_modal
    name: "Cross-Modal Interactions"
    description: "How sensory modalities interact"
    
  - id: theory
    name: "Theoretical Framework"
    description: "What theory guides the research"
    
  - id: evidence_strength
    name: "Evidence Strength"
    description: "Quality and type of evidence"

# ============================================================================
# FACET 1: ENVIRONMENTAL FACTORS (IVs)
# ============================================================================

environmental_factors:
  - id: env.luminous
    name: "Luminous Environment"
    level: 1
    children:
      - id: env.luminous.daylight
        name: "Daylighting"
        level: 2
        seeds:
          - "natural daylight in buildings"
          - "daylighting design and window placement"
          - "daylight factor and illuminance from windows"
          - "effects of natural light exposure on building occupants"
        children:
          - id: env.luminous.daylight.factor
            name: "Daylight Factor"
            level: 3
            seeds: ["daylight factor measurement", "DF percentage"]
          - id: env.luminous.daylight.direct_sun
            name: "Direct Sunlight"
            level: 3
            seeds: ["direct solar radiation indoors", "sun patches", "sunlight penetration"]
          - id: env.luminous.daylight.distribution
            name: "Daylight Distribution"
            level: 3
            seeds: ["daylight uniformity", "spatial distribution of natural light"]
          - id: env.luminous.daylight.dynamics
            name: "Daylight Dynamics"
            level: 3
            seeds: ["temporal variation of daylight", "daylight changes throughout day"]
            
      - id: env.luminous.electric
        name: "Electric Lighting"
        level: 2
